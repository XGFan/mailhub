# -----------------------------------------------------------------------------
# TEMPLATE ONLY — fill in real values in a copy of this file and DO NOT commit
# it (e.g. `secret.local.yaml`, already covered by a git-ignore pattern, or
# manage it out-of-band with SealedSecrets / an external-secrets operator).
# The values below are placeholders, not working credentials.
#
# Apply with:
#   kubectl create secret generic mailhub-secrets -n mailhub \
#     --from-env-file=portal/server/.env
# or `kubectl apply -f` a filled-in copy of this manifest.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mailhub-secrets
  namespace: mailhub
type: Opaque
stringData:
  # Least-privilege role scoped to the `mailhub` database (deploy/sql/role.sql).
  DATABASE_URL: "postgres://mailhub:CHANGE_ME@postgres.example.svc.cluster.local:5432/mailhub"

  # R2 bucket exposed over the S3 API. Token scoped to Get/List/Delete/Put on
  # this one bucket only (plan §5.2) — never an account-wide token.
  R2_ENDPOINT: "https://<account-id>.r2.cloudflarestorage.com"
  R2_ACCESS_KEY_ID: "CHANGE_ME"
  R2_SECRET_ACCESS_KEY: "CHANGE_ME"
  R2_BUCKET: "mailhub-raw"

  # Non-secret, but kept here so envFrom stays a single source of truth.
  PORT: "8787"
  POLL_INTERVAL_MS: "60000"
  ATTACHMENT_DIR: "/data/attachments"
  MAX_MAIL_BYTES: "27262976"
  RETENTION_DAYS: "7"

  # Optional API keys for the /api/* gate (comma-separated). Leave unset to keep
  # the portal open (default). When set, /api/* requires `X-API-Key: <key>` or
  # `Authorization: Bearer <key>`; /healthz, /readyz and the SPA stay open.
  # Generate with: openssl rand -hex 32
  # API_KEYS: "CHANGE_ME"

  # Optional shared secret for the Worker "new mail" nudge (POST /api/signal).
  # Unset = endpoint hidden (poll-only). Independent of API_KEYS.
  # SIGNAL_KEY: "CHANGE_ME"
