# Full local, prod-like stack for MailHub: Postgres + MinIO (R2 stand-in) +
# the actual portal container image built from the repo-root Dockerfile.
#
# Unlike portal/server/docker-compose.yml (bare Postgres+MinIO, for
# `pnpm --filter @mailhub/portal-server dev`), this runs the built image
# end-to-end — useful for validating the Dockerfile/deploy story before
# pushing to k8s.
#
#   docker compose -f deploy/docker-compose.yml up --build
#
# The `createbuckets` job creates the `mailhub-raw` bucket automatically; the
# portal is then reachable at http://localhost:8787.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailhub
      POSTGRES_PASSWORD: mailhub
      POSTGRES_DB: mailhub
    ports:
      - '5432:5432'
    volumes:
      - mailhub_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mailhub']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mailhub
      MINIO_ROOT_PASSWORD: mailhub-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - mailhub_minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 mailhub mailhub-secret &&
      (mc mb -p local/mailhub-raw || true) &&
      exit 0
      "

  portal:
    build:
      context: ..
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://mailhub:mailhub@postgres:5432/mailhub
      R2_ENDPOINT: http://minio:9000
      R2_ACCESS_KEY_ID: mailhub
      R2_SECRET_ACCESS_KEY: mailhub-secret
      R2_BUCKET: mailhub-raw
      PORT: '8787'
      POLL_INTERVAL_MS: '30000'
      ATTACHMENT_DIR: /data/attachments
      MAX_MAIL_BYTES: '27262976'
      RETENTION_DAYS: '7'
    ports:
      - '8787:8787'
    volumes:
      - mailhub_attachments:/data/attachments

volumes:
  mailhub_pg:
  mailhub_minio:
  mailhub_attachments:
