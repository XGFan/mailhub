# Self-contained integration stack for the MailHub full-stack E2E suite:
# Postgres (mail store) + MinIO (R2 stand-in over the S3 API).
#
# Ports are deliberately non-default (5433 / 9100-9101) so this stack does not
# collide with a developer's own Postgres/MinIO or with the portal's own
# portal/server/docker-compose.yml. The project name (mailhub-e2e) also keeps
# the volumes isolated. See global-setup.ts for how it is brought up/down.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailhub
      POSTGRES_PASSWORD: mailhub
      POSTGRES_DB: mailhub
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mailhub']
      interval: 3s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mailhub
      MINIO_ROOT_PASSWORD: mailhub-secret
    ports:
      - '9100:9000'
      - '9101:9001'
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || exit 1']
      interval: 3s
      timeout: 5s
      retries: 20
