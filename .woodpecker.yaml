# MailHub CI —— 与 temp-mail-hub 同款：test → build(push registry) → Flux image automation(infra 侧) → bark 通知。
# 需要的 Woodpecker secrets：docker_username / docker_password（registry）、bark_token（通知）。
# 镜像 docker.test4x.com/xgfan/mailhub:{<sha8>,latest}；live 跑具体 SHA（k8s 清单里 :latest 仅模板）。
when:
  branch: master
  event: [push, manual]
steps:
  # 注：不在 CI 跑 pnpm install/test —— 集群到 registry.npmjs.org 出网极慢(~1-3 KiB/s，会 fetch failed)。
  # 单元/集成/E2E 测试在本地跑(pnpm -r test + e2e/)，CI 以 build(镜像可编译) 作为门禁。
  - name: build
    image: docker.test4x.com/xgfan/plugin-docker-buildx-check
    settings:
      repo: docker.test4x.com/xgfan/mailhub
      registry: docker.test4x.com
      mirror: https://docker.test4x.com
      tags:
        - "${CI_COMMIT_BRANCH}-${CI_COMMIT_SHA:0:8}-${CI_PIPELINE_NUMBER}"
        - latest
      mtu: 1450
      cache_from: docker.test4x.com/xgfan/mailhub:cache
      cache_to: docker.test4x.com/xgfan/mailhub:cache
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
  - name: notify-success
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: success
  - name: notify-failure
    image: docker.test4x.com/xgfan/plugin-bark
    failure: ignore
    settings:
      token:
        from_secret: bark_token
      status: failure
    when:
      - status: [failure]
